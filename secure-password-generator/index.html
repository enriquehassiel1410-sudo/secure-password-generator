<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassGen — Generador de contraseñas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --bg2:      #161b22;
    --bg3:      #1c2330;
    --border:   #2a3344;
    --border2:  #3a4a5e;
    --cyan:     #58d9c8;
    --cyan-dim: #2a6b63;
    --text:     #cdd9e5;
    --text-dim: #6b7d8f;
    --text-bright: #e6edf3;
    --red:      #f47067;
    --amber:    #e3b341;
    --green:    #3fb950;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .shell {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  .header {
    margin-bottom: 40px;
  }
  .header-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }
  .header h1 {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 300;
    color: var(--text-bright);
    letter-spacing: -0.01em;
  }
  .header h1 span {
    color: var(--cyan);
    font-weight: 500;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .card:focus-within { border-color: var(--border2); }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    padding: 7px 12px;
    border: none;
    background: none;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--bg3);
    color: var(--text-bright);
    border: 1px solid var(--border);
  }

  /* ── Slider ── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .slider-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .slider-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--cyan);
    min-width: 36px;
    text-align: right;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--cyan);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  /* ── Checkboxes ── */
  .checks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .chk-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 13px;
    color: var(--text);
    user-select: none;
  }
  .chk-label:hover { border-color: var(--border2); }
  .chk-label input { display: none; }
  .chk-box {
    width: 15px;
    height: 15px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .chk-label input:checked ~ .chk-box {
    background: var(--cyan-dim);
    border-color: var(--cyan);
  }
  .chk-label input:checked ~ .chk-box::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 1.5px solid var(--cyan);
    border-bottom: 1.5px solid var(--cyan);
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }
  .chk-mono {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Password output ── */
  .pw-output {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0 0;
    min-height: 60px;
    position: relative;
    overflow: hidden;
  }
  .pw-output::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cyan);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .pw-output.has-pw::before { opacity: 1; }
  .pw-text {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 400;
    color: var(--text-bright);
    flex: 1;
    word-break: break-all;
    letter-spacing: 0.04em;
  }
  .pw-placeholder {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    padding: 6px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover { color: var(--text-bright); background: var(--bg3); }
  .icon-btn svg { width: 16px; height: 16px; }

  .entropy-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: right;
  }
  .entropy-tag span { color: var(--cyan); }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn-primary {
    flex: 1;
    padding: 11px 20px;
    background: var(--cyan);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-ghost {
    padding: 11px 16px;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--cyan-dim); }

  /* ── Strength meter ── */
  .strength-section { margin-top: 20px; }
  .strength-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .strength-lbl {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .strength-val {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .meter-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .meter-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s;
    width: 0%;
  }
  .criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }
  .crit-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    transition: color 0.2s;
  }
  .crit-item.ok { color: var(--text); }
  .crit-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border2);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .crit-item.ok .crit-dot { background: var(--cyan); }

  /* ── AI Panel ── */
  .ai-panel {
    background: var(--bg3);
    border: 1px solid var(--cyan-dim);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    min-height: 52px;
    display: none;
  }
  .ai-panel.visible { display: block; }
  .ai-panel-head {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .ai-loading { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* ── Custom eval input ── */
  .eval-input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 4px;
  }
  .eval-input:focus { border-color: var(--border2); }
  .eval-input::placeholder { color: var(--text-dim); font-size: 12px; }

  /* ── History ── */
  .history-list {
    max-height: 240px;
    overflow-y: auto;
  }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .hist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-pw {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
  }
  .hist-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .empty-state {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 16px 0;
    text-align: center;
  }

  /* ── Notification toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--cyan-dim);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--cyan);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Tab panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Cursor blink on header ── */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--cyan);
    vertical-align: middle;
    margin-left: 3px;
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .clear-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    float: right;
    margin-top: -2px;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--red); }
</style>
</head>
<body>

<div class="shell">

  <header class="header">
    <p class="header-eyebrow">// security tool v2.0</p>
    <h1><span>pass</span>gen<span class="cursor"></span></h1>
    <p class="header-sub">Generador de contraseñas con seguridad criptográfica</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('gen',this)">Generar</button>
    <button class="tab" onclick="switchTab('eval',this)">Evaluar</button>
    <button class="tab" onclick="switchTab('hist',this)">Historial</button>
  </div>

  <!-- ── TAB: GENERAR ── -->
  <div id="tab-gen" class="tab-panel active">
    <div class="card">
      <p class="card-label">Configuración</p>

      <div class="slider-row">
        <span class="slider-label">longitud</span>
        <input type="range" min="4" max="64" value="16" id="len-slider"
               oninput="document.getElementById('len-val').textContent=this.value">
        <span class="slider-val" id="len-val">16</span>
      </div>

      <div class="checks">
        <label class="chk-label">
          <input type="checkbox" id="inc-upper" checked>
          <span class="chk-box"></span>
          Mayúsculas
          <span class="chk-mono">A–Z</span>
        </label>
        <label class="chk-label">
          <input type="checkbox" id="inc-lower" checked>
          <span class="chk-box"></span>
          Minúsculas
          <span class="chk-mono">a–z</span>
        </label>
        <label class="chk-label">
          <input type="checkbox" id="inc-digits" checked>
          <span class="chk-box"></span>
          Números
          <span class="chk-mono">0–9</span>
        </label>
        <label class="chk-label">
          <input type="checkbox" id="inc-special" checked>
          <span class="chk-box"></span>
          Especiales
          <span class="chk-mono">!@#…</span>
        </label>
      </div>

      <div class="pw-output" id="pw-box">
        <span class="pw-placeholder">— presiona generar —</span>
        <button class="icon-btn" onclick="copyPw(currentPw)" aria-label="Copiar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <p class="entropy-tag" id="entropy-tag"></p>

      <div class="btn-row">
        <button class="btn-primary" onclick="generate()">↻ &nbsp;generar</button>
        <button class="btn-ghost" onclick="generateWithAI()">+ IA</button>
      </div>
    </div>

    <div class="card" id="strength-card" style="display:none">
      <div class="strength-section">
        <div class="strength-top">
          <span class="strength-lbl">fortaleza</span>
          <span class="strength-val" id="strength-val"></span>
        </div>
        <div class="meter-track">
          <div class="meter-fill" id="meter-fill"></div>
        </div>
        <div class="criteria-grid" id="criteria-grid"></div>
      </div>
    </div>

    <div class="ai-panel" id="gen-ai">
      <p class="ai-panel-head">// análisis IA</p>
      <p id="gen-ai-text"></p>
    </div>
  </div>

  <!-- ── TAB: EVALUAR ── -->
  <div id="tab-eval" class="tab-panel">
    <div class="card">
      <p class="card-label">Evaluar contraseña</p>
      <input class="eval-input" type="text" id="eval-input"
             placeholder="escribe o pega una contraseña..."
             oninput="evalCustom(this.value)">

      <div id="eval-strength-wrap" style="display:none">
        <div class="strength-section">
          <div class="strength-top">
            <span class="strength-lbl">fortaleza</span>
            <span class="strength-val" id="eval-strength-val"></span>
          </div>
          <div class="meter-track">
            <div class="meter-fill" id="eval-meter-fill"></div>
          </div>
          <div class="criteria-grid" id="eval-criteria-grid"></div>
        </div>
        <p class="entropy-tag" id="eval-entropy-tag" style="margin-top:10px"></p>
      </div>

      <div class="btn-row" style="margin-top:14px">
        <button class="btn-ghost" style="flex:1" onclick="analyzeCustomWithAI()">Analizar con IA</button>
      </div>
    </div>

    <div class="ai-panel" id="eval-ai">
      <p class="ai-panel-head">// análisis IA</p>
      <p id="eval-ai-text"></p>
    </div>
  </div>

  <!-- ── TAB: HISTORIAL ── -->
  <div id="tab-hist" class="tab-panel">
    <div class="card">
      <p class="card-label">
        Historial
        <button class="clear-btn" onclick="clearHistory()">limpiar</button>
      </p>
      <div class="history-list" id="history-list">
        <p class="empty-state">// ninguna contraseña generada aún</p>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let currentPw = '';
const STORAGE_KEY = 'passgen_history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveHistory(h) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }
  catch {}
}

let history = loadHistory();

// ── Charset ──
const UPPER   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER   = 'abcdefghijklmnopqrstuvwxyz';
const DIGITS  = '0123456789';
const SPECIAL = '!@#$%^&*()-_=+[]{}|;:,.<>?';

function cryptoChoice(str) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return str[arr[0] % str.length];
}

function getCharset() {
  let cs = '';
  if (document.getElementById('inc-upper').checked)   cs += UPPER;
  if (document.getElementById('inc-lower').checked)   cs += LOWER;
  if (document.getElementById('inc-digits').checked)  cs += DIGITS;
  if (document.getElementById('inc-special').checked) cs += SPECIAL;
  return cs;
}

// ── Generate ──
function generate() {
  const len = parseInt(document.getElementById('len-slider').value);
  const cs = getCharset();
  if (!cs) { showToast('Selecciona al menos un tipo'); return; }

  // Guaranteed chars per group
  const groups = [];
  if (document.getElementById('inc-upper').checked)   groups.push(UPPER);
  if (document.getElementById('inc-lower').checked)   groups.push(LOWER);
  if (document.getElementById('inc-digits').checked)  groups.push(DIGITS);
  if (document.getElementById('inc-special').checked) groups.push(SPECIAL);

  const mandatory = groups.map(g => cryptoChoice(g));
  const fill = Array.from({length: len - mandatory.length}, () => cryptoChoice(cs));
  const combined = [...mandatory, ...fill];

  // Fisher-Yates with crypto
  for (let i = combined.length - 1; i > 0; i--) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    const j = arr[0] % (i + 1);
    [combined[i], combined[j]] = [combined[j], combined[i]];
  }

  currentPw = combined.join('');
  renderPw(currentPw);
  renderStrength(currentPw, 'meter-fill', 'strength-val', 'criteria-grid');
  document.getElementById('strength-card').style.display = '';
  document.getElementById('gen-ai').classList.remove('visible');
  addHistory(currentPw);
}

// ── Render password ──
function renderPw(pw) {
  const box = document.getElementById('pw-box');
  box.classList.add('has-pw');
  box.innerHTML = `
    <span class="pw-text">${pw}</span>
    <button class="icon-btn" onclick="copyPw('${pw.replace(/'/g,"\\'")}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>`;
  const ent = entropy(pw);
  document.getElementById('entropy-tag').innerHTML =
    `entropía: <span>${ent.toFixed(1)} bits</span>`;
}

// ── Entropy ──
function entropy(pw) {
  let pool = 0;
  if (/[a-z]/.test(pw)) pool += 26;
  if (/[A-Z]/.test(pw)) pool += 26;
  if (/[0-9]/.test(pw)) pool += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) pool += 32;
  return pw.length * Math.log2(pool || 1);
}

// ── Strength ──
function getCriteria(pw) {
  return [
    { label: 'longitud ≥ 8',  ok: pw.length >= 8  },
    { label: 'longitud ≥ 12', ok: pw.length >= 12 },
    { label: 'mayúsculas',    ok: /[A-Z]/.test(pw) },
    { label: 'minúsculas',    ok: /[a-z]/.test(pw) },
    { label: 'números',       ok: /[0-9]/.test(pw) },
    { label: 'especiales',    ok: /[^a-zA-Z0-9]/.test(pw) },
  ];
}

function renderStrength(pw, fillId, valId, gridId) {
  const crits = getCriteria(pw);
  const score = crits.filter(c => c.ok).length;
  const pct = Math.round((score / crits.length) * 100);

  const fill = document.getElementById(fillId);
  fill.style.width = pct + '%';

  let color, label;
  if (score <= 2)      { color = '#f47067'; label = 'DÉBIL'; }
  else if (score <= 3) { color = '#e3b341'; label = 'MODERADA'; }
  else if (score <= 4) { color = '#3fb950'; label = 'BUENA'; }
  else                 { color = '#58d9c8'; label = 'MUY FUERTE'; }

  fill.style.background = color;
  document.getElementById(valId).textContent = label;
  document.getElementById(valId).style.color = color;

  document.getElementById(gridId).innerHTML = crits.map(c => `
    <span class="crit-item${c.ok ? ' ok' : ''}">
      <span class="crit-dot"></span>${c.label}
    </span>`).join('');
}

// ── Eval tab ──
function evalCustom(pw) {
  const wrap = document.getElementById('eval-strength-wrap');
  if (!pw) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  renderStrength(pw, 'eval-meter-fill', 'eval-strength-val', 'eval-criteria-grid');
  const ent = entropy(pw);
  document.getElementById('eval-entropy-tag').innerHTML =
    `entropía: <span>${ent.toFixed(1)} bits</span>`;
}

// ── Copy ──
function copyPw(pw) {
  if (!pw) return;
  navigator.clipboard.writeText(pw).then(() => showToast('// copiado al portapapeles'));
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── History ──
function addHistory(pw) {
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  history.unshift({ pw, time });
  if (history.length > 30) history.pop();
  saveHistory(history);
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<p class="empty-state">// ninguna contraseña generada aún</p>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="hist-row">
      <span class="hist-pw">${h.pw}</span>
      <span class="hist-time">${h.time}</span>
      <button class="icon-btn" onclick="copyPw('${h.pw.replace(/'/g,"\\'")}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>`).join('');
}

function clearHistory() {
  history = [];
  saveHistory(history);
  renderHistory();
}

// ── Tabs ──
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// Render saved history on load
renderHistory();

// ── AI via Anthropic API ──
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: 'Eres un experto en ciberseguridad. Responde siempre en español, en texto plano sin markdown. Máximo 3 oraciones. Sé directo y técnico.',
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.map(b => b.text || '').join('') || 'Sin respuesta.';
}

async function generateWithAI() {
  generate();
  if (!currentPw) return;
  const panel = document.getElementById('gen-ai');
  const txt   = document.getElementById('gen-ai-text');
  panel.classList.add('visible');
  txt.innerHTML = '<span class="ai-loading">analizando...</span>';
  const crits = getCriteria(currentPw);
  const score = crits.filter(c => c.ok).length;
  const ent   = entropy(currentPw).toFixed(1);
  try {
    const result = await callClaude(
      `Contraseña de ${currentPw.length} caracteres, entropía ${ent} bits, cumple ${score}/6 criterios. Da un veredicto técnico y un consejo concreto.`
    );
    txt.textContent = result;
  } catch(e) {
    txt.textContent = 'Error al contactar la IA.';
  }
}

  const pw = document.getElementById('eval-input').value;
  if (!pw) { showToast('Escribe una contraseña primero'); return; }

  txt.innerHTML = '<span class="ai-loading">analizando...</span>';
  const crits = getCriteria(pw);
  const score = crits.filter(c => c.ok).length;
  const ent   = entropy(pw).toFixed(1);
  try {
    const result = await callClaude(
      `El usuario quiere saber si su contraseña es segura. Tiene ${pw.length} caracteres, entropía ${ent} bits, cumple ${score}/6 criterios. No repitas la contraseña. Veredicto técnico y consejo.`
    );
    txt.textContent = result;
  } catch(e) {
    txt.textContent = 'Error al contactar la IA.';
  }
}
